spring.application.name=TimeBasedMessageService

spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:timebased-demo.db
spring.sql.init.mode=always

timebased.kafka.bootstrap-servers=localhost:9092
timebased.kafka.topic=smsgwrequest
timebased.kafka.mock-enabled=true

timebased.db.table-name=SMM_SMS_MSG_MSTR
timebased.db.pipe-id=
timebased.db.fetch-limit=10

timebased.poll.fixed-delay-ms=15000
timebased.demo.run-once=false

logging.level.com.icici.timebasedmessageservice=INFO
