spring.application.name=VendorHealthCheckService

spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:vendor-health.db
spring.sql.init.mode=always

vendorhealth.poll.fixed-delay-ms=10000
vendorhealth.db.details-table=TBL_VENDOR_HEALTH_DETAILS
vendorhealth.db.config-table=TBL_VENDOR_HEALTH_CONFIG
vendorhealth.api.url=https://apigeeuat.icicibankltd.com:8443/smsgateway/send/sms
vendorhealth.crypto.public-key-path=D:\\key\\ICICI_UAT_PublicCert.cer
vendorhealth.crypto.private-key-path=D:\\key\\DISPENSER_PrivateKey.pem

logging.level.com.icici.vendorhealthcheckservice=INFO
